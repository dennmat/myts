name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*" # triggers on v1.0.0, v0.2.3, etc

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      
    steps:
      - name: Check version matches tag
        run: |
            VERSION=$(grep '^version =' pyproject.toml | cut -d '"' -f2)
            TAG=${GITHUB_REF#refs/tags/v}
            if [ "$VERSION" != "$TAG" ]; then
            echo "Version mismatch: pyproject=$VERSION tag=$TAG"
            exit 1
            fi

      - name: Checkout
        uses: actions/checkout@v4
    
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
    
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build
        
      - name: Install deps
        run: pip install .
    
      - name: Run tests
        run: pytest
    
      - name: Build package
        run: python -m build
    
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1